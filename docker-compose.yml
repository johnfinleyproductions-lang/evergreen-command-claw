services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: evergreen-command-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: command
      POSTGRES_PASSWORD: command_secret
      POSTGRES_DB: evergreen_command
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U command -d evergreen_command"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NOTE: ports 9010/9011 (not 9000/9001) because the old
  # evergreen-vault-minio container is still running on 9000/9001
  # and serves another project. Do not reuse those ports.
  minio:
    image: minio/minio:latest
    container_name: evergreen-command-minio
    restart: unless-stopped
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  miniodata:
